name: Release Assets

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  upload-leash-assets:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-2022
            target: x86_64-pc-windows-msvc
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build leash
        run: cargo build --locked -p leash-cli --bin leash --target "${{ matrix.target }}"

      - name: Prepare release asset
        id: asset
        run: |
          asset_name="leash-${{ matrix.target }}"
          binary_path="target/${{ matrix.target }}/debug/leash"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            asset_name="${asset_name}.exe"
            binary_path="${binary_path}.exe"
          fi
          cp "${binary_path}" "${asset_name}"
          echo "asset_name=${asset_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload asset to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "${RELEASE_TAG}" "${{ steps.asset.outputs.asset_name }}#${{ steps.asset.outputs.asset_name }}" --clobber
